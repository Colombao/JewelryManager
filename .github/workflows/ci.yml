name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jewlery-back
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: jewlery-back/package-lock.json
      - run: npm ci
      - run: npm run test:coverage

  frontend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jewlery-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: jewlery-app/package-lock.json
      - run: npm ci
      - run: npm run test:coverage

  sonarcloud:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install backend dependencies
        working-directory: jewlery-back
        run: npm ci
      - name: Install frontend dependencies
        working-directory: jewlery-app
        run: npm ci
      - name: Run backend coverage
        working-directory: jewlery-back
        run: npm run test:coverage
      - name: Run frontend coverage
        working-directory: jewlery-app
        run: npm run test:coverage
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
